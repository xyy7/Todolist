<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>移动端待办事项</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="filter-section">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="today">今天</button>
                <button class="filter-btn" data-filter="week">本周</button>
                <button class="filter-btn" data-filter="month">本月</button>
                <button class="filter-btn" data-filter="all">全部</button>
            </div>
        </div>

        <div class="input-section">
            <input type="text" id="todo-input" placeholder="输入待办事项...">
        </div>

        <div class="date-add-section">
            <input type="date" id="todo-date" value="">
            <button id="add-btn">添加</button>
        </div>

        <div class="todos-container">
            <h2>待办事项</h2>
            <ul id="pending-list"></ul>

            <h2>已完成事项</h2>
            <ul id="completed-list"></ul>
        </div>
    </div>

    <div id="transfer-modal" class="modal">
        <div class="modal-content">
            <h3>未完成任务提醒</h3>
            <p>检测到过去有未完成任务，是否转移到今天？</p>
            <div class="modal-actions">
                <button id="transfer-yes">是</button>
                <button id="transfer-no">否</button>
                <label>
                    <input type="checkbox" id="transfer-remember-choice"> 记住我的选择
                </label>
            </div>
        </div>
    </div>

    <div id="debug-panel" class="debug-panel hidden">
        <div class="debug-panel-header">
            <span>调试面板</span>
            <button id="clear-debug" class="debug-panel-btn">清空</button>
        </div>
        <div id="debug-messages" class="debug-messages"></div>
    </div>
    <button id="toggle-debug" class="debug-toggle-btn">显示调试面板</button>
    <button id="toggle-settings" class="settings-toggle-btn">设置</button>
    
    <div id="settings-panel" class="settings-panel hidden">
        <div class="settings-panel-header">
            <span>设置</span>
            <button id="close-settings" class="settings-panel-btn">保存并关闭</button>
        </div>
        <div class="settings-content">
            <div class="setting-item">
                <label>
                    <input type="checkbox" id="auto-transfer" checked>
                    转移过去未完成任务到今天
                </label>
            </div>
            <div class="setting-item">
                <label>
                    <input type="checkbox" id="remember-choice">
                    不展示转移提醒
                </label>
            </div>
            <div class="setting-item">
                <label>启动默认视图:</label>
                <select id="default-view">
                    <option value="today">今天</option>
                    <option value="week">本周</option>
                    <option value="month">本月</option>
                    <option value="all">全部</option>
                    <option value="last">打开上次退出视图</option>
                </select>
            </div>
            <div class="setting-item">
                <label>
                    <input type="checkbox" id="debug-mode">
                    调试模式
                </label>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <div id="encouragement" class="hidden">
        <p id="encouragement-text"></p>
    </div>
</body>
</html>
